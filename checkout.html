<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Being Hungry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FFFDF5;--cream2:#FDF5E6;--cream3:#F5EAD7;
  --gold:#B8750A;--gold2:#D4920E;--gold-lt:#FBF0DC;
  --red:#C0392B;--green:#2D8653;
  --dark:#1A1209;--text:#3D2B1F;--muted:#8A7060;
  --border:rgba(184,117,10,.18);
  --shadow:0 2px 20px rgba(26,18,9,.07);
  --shadow-md:0 4px 30px rgba(26,18,9,.11);
  --shadow-lg:0 8px 40px rgba(26,18,9,.15);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}

/* NAVBAR */
.navbar{
  position:sticky;top:0;z-index:500;padding:0 40px;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,253,245,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);box-shadow:var(--shadow);
}
.nav-logo{display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-logo img{height:42px;width:42px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.nav-logo .name{font-family:'Playfair Display',serif;font-size:19px;color:var(--dark)}
.nav-logo .tag{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:-2px}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:13px;font-weight:500;color:var(--muted);transition:color .2s}
.nav-links a:hover{color:var(--gold)}
.btn-back{
  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;
  background:var(--cream2);border:1px solid var(--border);border-radius:30px;
  font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;
}
.btn-back:hover{background:var(--gold);color:#fff;border-color:var(--gold)}

/* CHECKOUT HEADER */
.checkout-header{
  background:linear-gradient(135deg,var(--dark) 0%,#3a2010 100%);
  padding:48px clamp(20px,5vw,90px);color:#FFFDF5;text-align:center;
}
.checkout-header h1{font-size:clamp(28px,4vw,44px);margin-bottom:8px}
.checkout-header h1 em{color:#F5C842;font-style:italic}
.checkout-header p{font-size:14px;color:rgba(255,253,245,.65);max-width:600px;margin:0 auto}

/* CHECKOUT CONTENT */
.checkout-content{padding:48px clamp(20px,5vw,90px);max-width:1200px;margin:0 auto}
.checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}

/* ORDER SUMMARY */
.order-summary{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:28px;box-shadow:var(--shadow);position:sticky;top:88px;
}
.summary-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--dark);margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--border)}
.summary-items{max-height:400px;overflow-y:auto;margin-bottom:20px}
.summary-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.summary-item:last-child{border-bottom:none}
.si-name{flex:1;font-size:14px;font-weight:600;color:var(--dark)}
.si-qty{font-size:12px;color:var(--muted);margin-left:8px}
.si-price{font-size:14px;font-weight:700;color:var(--gold);min-width:80px;text-align:right}
.summary-totals{padding-top:16px;border-top:2px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:10px}
.summary-row.total{font-size:18px;font-weight:700;color:var(--dark);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.summary-row.total .amt{color:var(--gold);font-size:22px}

/* CHECKOUT FORM */
.checkout-form{
  background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:28px;box-shadow:var(--shadow);
}
.form-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--dark);margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--border)}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:700;color:var(--dark);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.form-label i{margin-right:6px;color:var(--gold)}
.form-input{
  width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Inter',sans-serif;transition:border-color .2s;background:#fff;
}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{resize:vertical;min-height:80px}

/* PAYMENT METHOD */
.payment-section{margin-top:28px;padding-top:24px;border-top:2px solid var(--border)}
.payment-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--dark);margin-bottom:16px}
.payment-options{display:grid;gap:12px}
.payment-option{
  position:relative;border:2px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:all .2s;background:var(--cream2);
}
.payment-option:hover{border-color:var(--gold);background:var(--gold-lt)}
.payment-option.selected{border-color:var(--gold);background:var(--gold-lt);box-shadow:0 0 0 3px rgba(184,117,10,.15)}
.payment-option input[type="radio"]{position:absolute;opacity:0;pointer-events:none}
.payment-option-content{display:flex;align-items:center;gap:14px}
.payment-icon{
  width:48px;height:48px;border-radius:12px;background:#fff;
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--gold);flex-shrink:0;
}
.payment-option.selected .payment-icon{background:var(--gold);color:#fff;border-color:var(--gold)}
.payment-info{flex:1}
.payment-name{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:2px}
.payment-desc{font-size:12px;color:var(--muted)}

/* QR CODE */
.qr-section{
  margin-top:16px;padding:20px;background:#fff;border-radius:12px;
  border:2px dashed var(--border);text-align:center;display:none;
}
.qr-section.show{display:block}
.qr-code{
  max-width:220px;width:100%;margin:0 auto;border-radius:12px;
  border:2px solid var(--border);box-shadow:var(--shadow-md);
}
.qr-label{
  margin-top:12px;font-size:12px;font-weight:700;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;
}
.qr-amount{
  margin-top:8px;font-size:24px;font-weight:700;color:var(--gold);
  font-family:'Playfair Display',serif;
}

/* PLACE ORDER BUTTON */
.btn-place-order{
  width:100%;padding:16px;margin-top:24px;background:var(--gold);color:#fff;
  border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:10px;font-family:'Inter',sans-serif;
}
.btn-place-order:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,117,10,.4)}
.btn-place-order:disabled{background:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}

/* CART EMPTY */
.cart-empty{
  text-align:center;padding:60px 20px;background:#fff;border-radius:16px;
  border:2px dashed var(--border);
}
.cart-empty i{font-size:64px;color:var(--gold);opacity:.3;margin-bottom:20px;display:block}
.cart-empty h2{font-family:'Playfair Display',serif;font-size:28px;color:var(--dark);margin-bottom:12px}
.cart-empty p{color:var(--muted);margin-bottom:24px}
.btn-continue{
  display:inline-flex;align-items:center;gap:8px;padding:12px 28px;
  background:var(--gold);color:#fff;border-radius:30px;font-size:14px;
  font-weight:700;text-decoration:none;transition:all .2s;
}
.btn-continue:hover{background:var(--gold2);transform:translateY(-2px)}

/* TOAST */
.toast{
  position:fixed;top:24px;right:24px;background:var(--green);color:#fff;
  padding:14px 24px;border-radius:10px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow-lg);z-index:9999;transform:translateX(400px);
  transition:transform .3s ease;display:flex;align-items:center;gap:10px;
}
.toast.show{transform:translateX(0)}
.toast.error{background:var(--red)}

/* RESPONSIVE */
@media(max-width:900px){
  .navbar{padding:0 16px}
  .nav-links{display:none}
  .checkout-grid{grid-template-columns:1fr}
  .order-summary{position:static;top:auto}
}
@media(max-width:480px){
  .checkout-header{padding:32px 20px}
  .checkout-content{padding:28px 20px}
  .order-summary,.checkout-form{padding:20px}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="menu.html" class="nav-logo">
    <img src="images/logo.jpeg" alt="Being Hungry">
    <div>
      <span class="name">Being Hungry</span>
      <span class="tag">A Family Cafe & Restro</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="index.html#location">Find Us</a>
  </div>
  <button class="btn-back" onclick="history.back()">
    <i class="fa fa-arrow-left"></i> Back
  </button>
</nav>

<!-- CHECKOUT HEADER -->
<div class="checkout-header">
  <h1>Complete Your <em>Order</em></h1>
  <p>Fill in your details below and choose your preferred payment method</p>
</div>

<!-- CHECKOUT CONTENT -->
<div class="checkout-content" id="checkoutContent">
  <!-- Content will be generated by JavaScript -->
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fa fa-check-circle"></i>
  <span id="toastMsg">Order placed successfully!</span>
</div>

<script>
const WA = '918317778612';
let cart = {};
let paymentMethod = 'qr'; // 'qr' or 'cod'

// Load cart from localStorage
function loadCart() {
  const cartData = localStorage.getItem('bh_cart');
  if (cartData) {
    cart = JSON.parse(cartData);
  }
}

// Calculate totals
function calculateTotals() {
  const entries = Object.entries(cart);
  const subtotal = entries.reduce((a,[,v]) => a+v.price*v.qty, 0);
  const deliveryFee = subtotal >= 299 ? 0 : 30;
  const total = subtotal + deliveryFee;
  return { subtotal, deliveryFee, total, itemCount: entries.reduce((a,[,v]) => a+v.qty, 0) };
}

// Render checkout page
function renderCheckout() {
  const { subtotal, deliveryFee, total, itemCount } = calculateTotals();
  const entries = Object.entries(cart);
  
  if (!entries.length) {
    document.getElementById('checkoutContent').innerHTML = `
      <div class="cart-empty">
        <i class="fa fa-shopping-basket"></i>
        <h2>Your Cart is Empty</h2>
        <p>Add some delicious items from our menu before checkout</p>
        <a href="menu.html" class="btn-continue">
          <i class="fa fa-utensils"></i> Browse Menu
        </a>
      </div>
    `;
    return;
  }

  const html = `
    <div class="checkout-grid">
      <!-- LEFT: Checkout Form -->
      <div class="checkout-form">
        <div class="form-title">Your Details</div>
        
        <form id="checkoutForm" onsubmit="placeOrder(event)">
          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-user"></i> Full Name
            </label>
            <input type="text" class="form-input" id="customerName" required placeholder="Enter your full name" autocomplete="name">
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-phone"></i> Phone Number
            </label>
            <input type="tel" class="form-input" id="customerPhone" required placeholder="Enter your phone number" autocomplete="tel" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number">
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-map-marker-alt"></i> Delivery Address
            </label>
            <textarea class="form-input" id="customerAddress" required placeholder="Enter your complete delivery address" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-comment"></i> Special Instructions (Optional)
            </label>
            <textarea class="form-input" id="specialInstructions" placeholder="Any special requests or instructions" rows="2"></textarea>
          </div>

          <!-- Payment Method -->
          <div class="payment-section">
            <div class="payment-title">Payment Method</div>
            <div class="payment-options">
              <div class="payment-option selected" onclick="selectPayment('qr')" id="qrOption">
                <input type="radio" name="payment" value="qr" checked>
                <div class="payment-option-content">
                  <div class="payment-icon">
                    <i class="fa fa-qrcode"></i>
                  </div>
                  <div class="payment-info">
                    <div class="payment-name">Pay via QR Code</div>
                    <div class="payment-desc">Scan QR code to pay now</div>
                  </div>
                </div>
              </div>

              <div class="payment-option" onclick="selectPayment('cod')" id="codOption">
                <input type="radio" name="payment" value="cod">
                <div class="payment-option-content">
                  <div class="payment-icon">
                    <i class="fa fa-money-bill-wave"></i>
                  </div>
                  <div class="payment-info">
                    <div class="payment-name">Cash on Delivery</div>
                    <div class="payment-desc">Pay when you receive your order</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- QR Code Section -->
            <div class="qr-section show" id="qrSection">
              <img src="images/qr.png" alt="Payment QR Code" class="qr-code">
              <div class="qr-label">Scan to Pay</div>
              <div class="qr-amount">₹${total}</div>
              <p style="font-size:12px;color:var(--muted);margin-top:8px">
                After payment, click "Place Order" to confirm
              </p>
            </div>
          </div>

          <button type="submit" class="btn-place-order" id="placeOrderBtn">
            <i class="fab fa-whatsapp"></i>
            Proceed to Checkout
          </button>
        </form>
      </div>

      <!-- RIGHT: Order Summary -->
      <div class="order-summary">
        <div class="summary-title">Order Summary</div>
        
        <div class="summary-items">
          ${entries.map(([id, {name, price, qty}]) => `
            <div class="summary-item">
              <div>
                <span class="si-name">${name}</span>
                <span class="si-qty">× ${qty}</span>
              </div>
              <div class="si-price">₹${price * qty}</div>
            </div>
          `).join('')}
        </div>

        <div class="summary-totals">
          <div class="summary-row">
            <span>Subtotal (${itemCount} items)</span>
            <span>₹${subtotal}</span>
          </div>
          <div class="summary-row">
            <span>Delivery Fee</span>
            <span style="color:${deliveryFee === 0 ? 'var(--green)' : 'inherit'}">
              ${deliveryFee === 0 ? 'FREE' : '₹' + deliveryFee}
            </span>
          </div>
          ${deliveryFee > 0 ? `<div style="font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:8px">Free delivery on orders above ₹299</div>` : ''}
          <div class="summary-row total">
            <span>Total</span>
            <span class="amt">₹${total}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('checkoutContent').innerHTML = html;
}

// Select payment method
function selectPayment(method) {
  paymentMethod = method;
  
  // Update UI
  document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
  document.getElementById(method + 'Option').classList.add('selected');
  document.getElementById(method + 'Option').querySelector('input[type="radio"]').checked = true;
  
  // Show/hide QR code
  const qrSection = document.getElementById('qrSection');
  if (qrSection) {
    qrSection.classList.toggle('show', method === 'qr');
  }
}

// Place order
function placeOrder(event) {
  event.preventDefault();
  
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const address = document.getElementById('customerAddress').value.trim();
  const instructions = document.getElementById('specialInstructions').value.trim();
  
  if (!name || !phone || !address) {
    showToast('Please fill in all required fields', true);
    return;
  }

  const { total } = calculateTotals();
  const entries = Object.entries(cart);
  
  // Build WhatsApp message
  let msg = `🆕 *NEW ORDER - Being Hungry*\n\n`;
  msg += `👤 *Customer Details:*\n`;
  msg += `Name: ${name}\n`;
  msg += `Phone: ${phone}\n`;
  msg += `Address: ${address}\n`;
  if (instructions) msg += `Instructions: ${instructions}\n`;
  msg += `\n📦 *Order Items:*\n`;
  
  entries.forEach(([,{name, qty, price}]) => {
    msg += `• ${name} × ${qty} = ₹${price * qty}\n`;
  });
  
  msg += `\n💳 *Payment Method:* ${paymentMethod === 'qr' ? 'QR Code' : 'Cash on Delivery'}\n`;
  msg += `💰 *Total Amount: ₹${total}*\n\n`;
  msg += `Please confirm this order. Thank you! 🎉`;
  
  // Open WhatsApp
  window.open('https://wa.me/' + WA + '?text=' + encodeURIComponent(msg), '_blank');
  
  // Clear cart
  localStorage.removeItem('bh_cart');
  
  // Show success message
  showToast('Order placed successfully! Redirecting to WhatsApp...');
  
  // Redirect to menu after 2 seconds
  setTimeout(() => {
    window.location.href = 'menu.html';
  }, 2000);
}

// Show toast notification
function showToast(message, isError = false) {
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  
  toastMsg.textContent = message;
  toast.className = 'toast show' + (isError ? ' error' : '');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  loadCart();
  renderCheckout();
});
</script>

</body>
</html>
